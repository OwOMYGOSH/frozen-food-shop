# deploy.yml — CI/CD：push 到 main branch 自動 build + 部署到 VPS
#
# 使用前，在 GitHub → Settings → Secrets and variables → Actions 設定：
#   PROD_HOST     : 正式機 IP（例如 DigitalOcean Droplet IP）
#   PROD_USER     : SSH 用戶名（通常是 root 或 ubuntu）
#   PROD_SSH_KEY  : SSH 私鑰（cat ~/.ssh/id_rsa 的內容）

name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]     # PR 只跑 build/test，不 deploy

jobs:
  # ---- Job 1：後端 Build & Test ----
  backend:
    name: Backend (Quarkus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend
        run: cd backend && ./mvnw package -DskipTests -q

      - name: Run Backend Tests
        run: cd backend && ./mvnw test -q

  # ---- Job 2：前端 Build ----
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        # npm install 取代 npm ci：
        # 因為 lock file 在 Windows 生成，缺少 Linux optional deps (@emnapi)
        # npm install 會自動補齊，npm ci 是嚴格模式會直接報錯
        run: cd frontend && npm install

      - name: Build Frontend
        run: cd frontend && npm run build -- --configuration=production

      - name: Run Frontend Tests
        # 必須透過 Angular CLI 執行 ng test，才能正確初始化 Vitest 環境
        # （Angular builder 負責注入 describe/it/expect globals 與 Angular 編譯器）
        # --watch=false = 跑一次就結束，不進入 watch 模式
        run: cd frontend && ng test --watch=false

  # ---- Job 3：部署（只有 push main 才執行）----
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend, frontend]       # backend + frontend 都 pass 才部署
    if: github.event_name == 'push'  # PR 不部署
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/frozen-food-shop
            git pull origin main
            # 重新 build 並更新服務（不停機更新）
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --build --remove-orphans
            # 清理舊的 docker image
            docker image prune -f
            echo "✅ Deploy 完成：$(date)"
