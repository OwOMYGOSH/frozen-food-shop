# nginx.conf — 本機開發用（無 SSL，反向代理到 backend:8080）
# 正式機版本請看 nginx.prod.conf

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Gzip 壓縮
  gzip on;
  gzip_types text/plain application/json application/javascript text/css application/xml;

  upstream backend_app {
    server backend:8080;
  }

  server {
    listen 80;
    server_name localhost;

    # ---- API 反向代理（轉給 Quarkus）----
    location /api/ {
      proxy_pass         http://backend_app;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ---- Quarkus health check（方便確認後端正常）----
    location /q/ {
      proxy_pass http://backend_app;
    }

    # ---- 開發環境：Angular dev server 跑在 localhost:4200，
    #      所以這裡暫不 serve 靜態檔案，直接用 ng serve 即可 ----
    location / {
      return 200 'Nginx OK - API is at /api/';
      add_header Content-Type text/plain;
    }
  }
}
