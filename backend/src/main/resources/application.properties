# ============================================================
#  application.properties — Quarkus 設定
#  環境變數從 .env 讀取（docker compose 自動注入）
# ============================================================

# ----- 應用程式 -----
quarkus.application.name=frozen-food-shop-backend
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200}

# ----- PostgreSQL 資料源 -----
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/frozendb}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:appuser}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:changeme_strong_password}
quarkus.datasource.jdbc.max-size=16

# ----- Flyway DB Migration -----
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# ----- Hibernate ORM -----
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.database.generation=none

# ----- Redis -----
quarkus.redis.hosts=${QUARKUS_REDIS_HOSTS:redis://:changeme_redis_password@localhost:6379}

# ----- JWT -----
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=frozen-food-shop
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.issuer=frozen-food-shop
smallrye.jwt.new-token.lifespan=${JWT_EXPIRY_SECONDS:3600}

# ----- OpenAPI / Swagger UI -----
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ----- 開發模式設定 -----
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.level=INFO
