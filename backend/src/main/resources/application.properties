# ============================================================
#  application.properties — Quarkus 設定
#
#  Profile 策略：
#  - dev / test：不設 DB URL → Quarkus Dev Services 自動啟動容器
#  - prod：從環境變數讀取，不用 Dev Services
# ============================================================

# ----- 應用程式 -----
quarkus.application.name=frozen-food-shop-backend
quarkus.http.port=8080

# ----- PostgreSQL — 只有 prod 設 URL，dev/test 交給 Dev Services -----
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.max-size=16
%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL}
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}

# ----- Flyway DB Migration -----
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# ----- Hibernate ORM -----
# dialect 不需要手動指定，Quarkus 自動偵測（移除可消除 deprecation warning）
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.database.generation=none

# ----- Redis — 只有 prod 設 URL，dev/test 交給 Dev Services -----
%prod.quarkus.redis.hosts=${QUARKUS_REDIS_HOSTS}

# ----- JWT -----
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=frozen-food-shop
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.issuer=frozen-food-shop
smallrye.jwt.new-token.lifespan=${JWT_EXPIRY_SECONDS:3600}

# ----- MinIO（圖片物件儲存）-----
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
minio.bucket=${MINIO_BUCKET:frozen-food-images}

# ----- OpenAPI / Swagger UI -----
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ----- CORS -----
quarkus.http.cors=true
%prod.quarkus.http.cors.origins=${CORS_ORIGINS}
%dev.quarkus.http.cors.origins=http://localhost:4200

# ----- Dev 模式 -----
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.level=INFO

# ----- Test 模式 -----
%test.quarkus.hibernate-orm.log.sql=true
