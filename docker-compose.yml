# docker-compose.yml — 本機開發用（含 hot-reload）
# 啟動：docker compose up
# 停止：docker compose down

version: '3.9'

services:
  # ---- 資料庫 ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'     # 本機開發時可直連（生產環境不開）
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped      # 如果容器掛了，會自動重啟，除非我手動停掉它

  # ---- 快取 / JWT Blacklist ----
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- 物件儲存（商品圖片）----
  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - '9000:9000'     # API
      - '9001:9001'     # Console UI → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---- 後端（Quarkus）----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev     # 開發用（非 native build）
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      QUARKUS_DATASOURCE_USERNAME: ${DB_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      QUARKUS_REDIS_HOSTS: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS}
      JWT_REFRESH_EXPIRY_SECONDS: ${JWT_REFRESH_EXPIRY_SECONDS}
      ECPAY_MERCHANT_ID: ${ECPAY_MERCHANT_ID}
      ECPAY_HASH_KEY: ${ECPAY_HASH_KEY}
      ECPAY_HASH_IV: ${ECPAY_HASH_IV}
      ECPAY_IS_SANDBOX: ${ECPAY_IS_SANDBOX}
      CORS_ORIGINS: ${CORS_ORIGINS}
      QUARKUS_HTTP_PORT: 8080
    volumes:
      - ./backend:/work           # hot-reload：掛載本機 source
    depends_on:
      postgres:
        condition: service_healthy # 確保 postgres 啟動成功後，再啟動 backend
      redis:
        condition: service_healthy # 確保 redis 啟動成功後，再啟動 backend
    ports:
      - '8080:8080'               # API
      - '5005:5005'               # Remote debug port
    restart: unless-stopped

  # ---- 反向代理（開發用輕量版）----
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
